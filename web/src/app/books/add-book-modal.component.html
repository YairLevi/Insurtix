@if (show()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/40" (click)="close()"></div>
    <div class="relative bg-white rounded-lg shadow-lg w-full max-w-md mx-2 sm:mx-4 p-4 sm:p-6">
      <h2 class="text-lg font-semibold text-gray-900 mb-4">Add Book</h2>

      <div class="flex flex-col gap-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">ISBN <span class="text-red-500">*</span></label>
          <div class="flex gap-2">
            <app-text-input [(value)]="addDraft.isbn" placeholder="e.g. 9780000000000" extraClass="flex-1" />
            <app-button size="sm" (clicked)="generateIsbn()">Generate</app-button>
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Title <span class="text-red-500">*</span></label>
          <app-text-input [(value)]="addDraft.title" placeholder="Book title" />
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Authors</label>
          <app-text-input [(value)]="addDraft.authors" placeholder="Author 1, Author 2" />
          <span class="text-xs text-gray-400">Separate multiple authors with commas</span>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-medium text-gray-600">Category</label>
          <app-text-input [(value)]="addDraft.category" placeholder="e.g. fiction" />
        </div>
        <div class="flex gap-3">
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs font-medium text-gray-600">Year</label>
            <app-text-input type="number" [(value)]="addDraft.year" [min]="1000" [max]="2100" [step]="1" />
          </div>
          <div class="flex flex-col gap-1 flex-1">
            <label class="text-xs font-medium text-gray-600">Price</label>
            <app-text-input type="number" [(value)]="addDraft.price" [min]="0" [step]="0.01" />
          </div>
        </div>
      </div>

      @if (addError()) {
        <p class="mt-3 text-sm text-red-600">{{ addError() }}</p>
      }

      <div class="flex justify-end gap-2 mt-5">
        <app-button (clicked)="close()">Cancel</app-button>
        <app-button variant="primary" [disabled]="isAdding()" (clicked)="submit()">
          {{ isAdding() ? 'Adding…' : 'Add Book' }}
        </app-button>
      </div>
    </div>
  </div>
}
